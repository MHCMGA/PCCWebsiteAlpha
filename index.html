    <!--
      Self-heal on stale-HTML / missing-chunk situations. When a deploy
      goes live without skew protection, any client still holding the
      previous build's HTML will 404 on the now-purged hashed chunks.
      This early handler listens for those failures, throws away the
      stale HTML, and reloads once so the browser fetches the fresh
      HTML with the current chunk names. Capped to one reload per 30 s
      to avoid loops if the asset really is gone.
    -->
    <script>
      (function () {
        var KEY = "pcc-bundle-reload-at";
        function shouldReload(now) {
          try {
            var last = +(sessionStorage.getItem(KEY) || 0);
            if (now - last < 30000) return false;
            sessionStorage.setItem(KEY, String(now));
            return true;
          } catch (e) {
            return true;
          }
        }
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (!t || t.tagName !== "SCRIPT" || !t.src) return;
            if (t.src.indexOf("/assets/") === -1) return;
            if (!shouldReload(Date.now())) return;
            try {
              window.location.reload();
            } catch (_) {}
          },
          true,
        );
      })();
    </script>

    <!--
      Per-page SEO tags (title, description, canonical, og:*) are hoisted
      to <head> by React 19's native document metadata support. See
      src/App.jsx for site-wide invariants and src/pages/*/*.jsx for
      per-page overrides. Open Graph tags double as the link-preview
      source for X and other platforms that fall back to og:* when
      twitter:* is absent.
    -->

    <!--
      LCP hero preload (responsive). Prefer AVIF — Chrome 85+, Firefox 93+,
      Safari 16+ all decode it natively and the encoded file is 38-68 %
      smaller than the WebP fallback. Older browsers ignore this preload
      (type mismatch) and pick up the WebP from <picture>'s fallback <img>;
      they pay one network round-trip for the smaller-overall payload.
    -->
    <link
      rel="preload"
      as="image"
      href="/hero-buildings-1400.avif"
      imagesrcset="/hero-buildings-600.avif 600w, /hero-buildings-900.avif 900w, /hero-buildings-1400.avif 1400w"
      imagesizes="100vw"
      type="image/avif"
      fetchpriority="high"
    />
    <!-- 3rd-party perf -->
    <link rel="dns-prefetch" href="https://va.vercel-scripts.com" />
    <link rel="preconnect" href="https://va.vercel-scripts.com" crossorigin />

    <!--
      Speculation Rules: tell Chromium-based browsers to fully prerender the
      two internal routes most likely to be clicked next, so navigation
      lands on a hot pipeline. `moderate` eagerness triggers on hover or
      pointerdown — safer than `eager` (which would prerender on page load
      and waste a render if the user never clicks).
    -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": { "href_matches": ["/about", "/contact"] },
            "eagerness": "moderate"
          }
        ],
        "prefetch": [
          {
            "where": { "href_matches": "/*" },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
